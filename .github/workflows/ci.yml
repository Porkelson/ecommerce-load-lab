name: CI — Smoke Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Spring Boot app
        run: chmod +x mvnw && ./mvnw -B package -DskipTests

      - name: Start app and PostgreSQL via docker-compose
        run: docker compose up -d --build

      - name: Wait for app to be ready
        run: |
          echo "Waiting for /actuator/health..."
          for i in $(seq 1 36); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "App is ready after ~$((i * 5))s"
              break
            fi
            if [ $i -eq 36 ]; then
              echo "App failed to start within 3 minutes"
              docker compose logs app
              exit 1
            fi
            sleep 5
          done

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -q
          sudo apt-get install -y k6

      - name: Run smoke test
        working-directory: ${{ github.workspace }}
        env:
          BASE_URL: http://localhost:8080
        run: k6 run k6/scenarios/smoke.js

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-smoke-report
          path: k6/reports/
          retention-days: 7

      - name: Tear down
        if: always()
        working-directory: app
        run: docker compose down -v
